server {
    listen 80;
    server_name skills.outlayer.ai;

    # Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name skills.outlayer.ai;

    # SSL — adjust paths to your cert/key
    ssl_certificate     /etc/letsencrypt/live/skills.outlayer.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skills.outlayer.ai/privkey.pem;

    root /var/www/skills.outlayer.ai;
    index index.html;

    # Serve .md files as plain text so they're readable in the browser
    types {
        text/plain md;
    }

    # Enable directory listing as fallback for skill subdirectories
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # Case-insensitive SKILL.md access:
    # skills.outlayer.ai/agent-custody/skill.md  ->  SKILL.md
    location ~ ^/([^/]+)/skill\.md$ {
        set $skill $1;
        try_files /$skill/skill.md /$skill/SKILL.md =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|svg|ico)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }
}
